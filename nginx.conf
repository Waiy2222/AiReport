worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server_names_hash_bucket_size 64;

    # Docker 内置 DNS，每次代理请求动态解析，容器重建 IP 变化也不会 502
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;

        # 模块 A — 资讯抓取
        location /run {
            set $upstream_a module-a:8001;
            proxy_pass http://$upstream_a;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 B — AI 内容加工
        location /run-b {
            set $upstream_b module-b:8002;
            proxy_pass http://$upstream_b;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 B — 长图输出
        location /longimage/ {
            set $upstream_b module-b:8002;
            proxy_pass http://$upstream_b;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 B — 简报预览
        location /preview/ {
            set $upstream_b module-b:8002;
            proxy_pass http://$upstream_b;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 C — 微信小程序 + 公众号回调
        location /push {
            set $upstream_c module-c:8003;
            proxy_pass http://$upstream_c;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 E — Dashboard API
        location /api/dashboard/ {
            set $upstream_e module-e:8005;
            proxy_pass http://$upstream_e;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 E — Dashboard 前端页面
        location /dashboard {
            set $upstream_e module-e:8005;
            proxy_pass http://$upstream_e;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            set $upstream_c module-c:8003;
            proxy_pass http://$upstream_c;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 微信公众号回调
        location /weixin/ {
            set $upstream_c module-c:8003;
            proxy_pass http://$upstream_c;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 D — 多平台发布
        location /publish {
            set $upstream_d module-d:8004;
            proxy_pass http://$upstream_d;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 E — 调度管理 + Dashboard
        location /admin/ {
            set $upstream_e module-e:8005;
            proxy_pass http://$upstream_e;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 F — 视频生成
        location /generate {
            set $upstream_f module-f:8006;
            proxy_pass http://$upstream_f;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /status/ {
            set $upstream_f module-f:8006;
            proxy_pass http://$upstream_f;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /videos {
            set $upstream_f module-f:8006;
            proxy_pass http://$upstream_f;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 各模块健康检查
        location /health/a { set $u module-a:8001; proxy_pass http://$u/health; }
        location /health/b { set $u module-b:8002; proxy_pass http://$u/health; }
        location /health/c { set $u module-c:8003; proxy_pass http://$u/health; }
        location /health/d { set $u module-d:8004; proxy_pass http://$u/health; }
        location /health/e { set $u module-e:8005; proxy_pass http://$u/health; }
        location /health/f { set $u module-f:8006; proxy_pass http://$u/health; }
    }
}
