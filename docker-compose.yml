services:
  # Phase 2: pgvector 替代原生 postgres
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_news}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./contracts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./contracts/seed_data.sql:/docker-entrypoint-initdb.d/02-seed_data.sql
      - ./contracts/schema_v2.sql:/docker-entrypoint-initdb.d/03-schema_v2.sql
      - ./contracts/seed_data_v2.sql:/docker-entrypoint-initdb.d/04-seed_data_v2.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  module-a:
    build:
      context: .
      dockerfile: ./module-a/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_news}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.deepseek.com/v1}
    depends_on:
      postgres:
        condition: service_healthy

  module-b:
    build: ./module-b
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_news}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  module-c:
    build: ./module-c/backend
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_news}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      WEIXIN_OA_APPID: ${WEIXIN_OA_APPID:-}
      WEIXIN_OA_SECRET: ${WEIXIN_OA_SECRET:-}
      WEIXIN_OA_TOKEN: ${WEIXIN_OA_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  module-d:
    build: ./module-d
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_news}
      ZHIHU_CLIENT_ID: ${ZHIHU_CLIENT_ID:-}
      ZHIHU_CLIENT_SECRET: ${ZHIHU_CLIENT_SECRET:-}
      CSDN_USERNAME: ${CSDN_USERNAME:-}
      CSDN_PASSWORD: ${CSDN_PASSWORD:-}
      WEIXIN_OA_APPID: ${WEIXIN_OA_APPID:-}
      WEIXIN_OA_SECRET: ${WEIXIN_OA_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  module-e:
    build: ./module-e
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_news}
      A_URL: http://module-a:8001/run
      B_URL: http://module-b:8002/run-b
      C_URL: http://module-c:8003/push
      D_URL: http://module-d:8004/publish
      F_URL: http://module-f:8006/generate
    depends_on:
      postgres:
        condition: service_healthy

  module-f:
    build: ./module-f
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_news}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      BAILIAN_BASE_URL: ${BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      BAILIAN_MODEL: ${BAILIAN_MODEL:-qwen-vl-max}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      VIDEO_OUTPUT_DIR: /app/output
      VIDEO_DOWNLOAD_DIR: /app/downloads
    volumes:
      - video_output:/app/output
      - video_downloads:/app/downloads
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - module-a
      - module-b
      - module-c
      - module-d
      - module-e
      - module-f

volumes:
  pgdata:
  video_output:
  video_downloads:
