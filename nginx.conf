worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server_names_hash_bucket_size 64;

    upstream module_a { server module-a:8001; }
    upstream module_b { server module-b:8002; }
    upstream module_c { server module-c:8003; }
    upstream module_d { server module-d:8004; }
    upstream module_e { server module-e:8005; }

    server {
        listen 80;

        # 模块 A — 资讯抓取
        location /run {
            proxy_pass http://module_a;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 B — AI 内容加工
        location /run-b {
            proxy_pass http://module_b;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 C — 微信小程序
        location /push {
            proxy_pass http://module_c;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://module_c;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 D — 多平台发布
        location /publish {
            proxy_pass http://module_d;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 模块 E — 调度管理 + Dashboard
        location /admin/ {
            proxy_pass http://module_e;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 各模块健康检查（透传）
        location /health/a { proxy_pass http://module_a/health; }
        location /health/b { proxy_pass http://module_b/health; }
        location /health/c { proxy_pass http://module_c/health; }
        location /health/d { proxy_pass http://module_d/health; }
        location /health/e { proxy_pass http://module_e/health; }
    }
}
